---
# ==============================================================================
# Write confluent-control-center systemd unit from template
# ==============================================================================

- name: "SERVICE | Write systemd unit"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/confluent-control-center.service.j2"
    dest: /etc/systemd/system/confluent-control-center.service
    owner: root
    group: root
    mode: "0644"
  notify: reload systemd

- name: "SERVICE | Enable service"
  ansible.builtin.systemd:
    name: "{{ c3_service_name }}"
    enabled: true
    daemon_reload: true
