---
# Called by deploy_secrets.yml for each secret property.
# Copies the original seed file fresh before each encrypt call so the CLI
# always sees full plaintext regardless of rewrites from prior iterations.

- name: "SECRETS | Copy fresh seed file for {{ secret_item }}"
  ansible.builtin.copy:
    src: "{{ secrets_tmpdir.path }}/server.properties"
    dest: "{{ secrets_tmpdir.path }}/server_orig.properties"
    remote_src: true
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"
  no_log: true

- name: "SECRETS | Encrypt {{ secret_item }}"
  ansible.builtin.command:
    argv:
      - "{{ broker_install_dir }}/bin/confluent"
      - "secret"
      - "file"
      - "encrypt"
      - "--config-file"
      - "{{ secrets_tmpdir.path }}/server_orig.properties"
      - "--local-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--remote-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--config"
      - "{{ secret_item }}"
  environment:
    CONFLUENT_SECURITY_MASTER_KEY: "{{ CONFLUENT_SECURITY_MASTER_KEY }}"
  become: true
  become_user: "{{ broker_user }}"
  register: encrypt_result
  failed_when: encrypt_result.rc != 0
  changed_when: true
