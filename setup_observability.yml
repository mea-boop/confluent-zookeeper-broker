---
# ==============================================================================
# Observability agents: Dynatrace, Node Exporter
# ==============================================================================

- name: "OBS | Download Dynatrace installer from Artifactory"
  ansible.builtin.get_url:
    url: "{{ c3_artifactory_base_url }}/{{ c3_artifactory_repo }}/dynatrace/{{ c3_dynatrace_installer }}"
    dest: "/tmp/{{ c3_dynatrace_installer }}"
    url_username: "{{ artifactory_user }}"
    url_password: "{{ artifactory_password }}"
    mode: "0755"

- name: "OBS | Install Dynatrace OneAgent"
  ansible.builtin.command:
    argv:
      - /bin/sh
      - "/tmp/{{ c3_dynatrace_installer }}"
      - "--set-host-group={{ c3_dynatrace_host_group }}"
      - "--set-host-id-source=ip-addresses"
      - "--set-network-zone={{ c3_dynatrace_network_zone }}"
  changed_when: true

- name: "OBS | Create node_exporter directory"
  ansible.builtin.file:
    path: "{{ c3_node_exporter_dir }}"
    state: directory
    mode: "0755"

- name: "OBS | Download node_exporter from Artifactory"
  ansible.builtin.get_url:
    url: "{{ c3_artifactory_base_url }}/{{ c3_artifactory_repo }}/prometheus/{{ c3_node_exporter_package }}"
    dest: "/tmp/{{ c3_node_exporter_package }}"
    url_username: "{{ artifactory_user }}"
    url_password: "{{ artifactory_password }}"
    mode: "0644"

- name: "OBS | Extract node_exporter"
  ansible.builtin.unarchive:
    src: "/tmp/{{ c3_node_exporter_package }}"
    dest: "{{ c3_node_exporter_dir }}"
    remote_src: true

- name: "OBS | Deploy node_exporter systemd unit"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/node-exporter.service.j2"
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: reload systemd

- name: "OBS | Enable and start node_exporter"
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
