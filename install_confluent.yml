---
# ==============================================================================
# Download and extract Confluent platform from JFrog Artifactory
# ==============================================================================

- name: "INSTALL | Download Confluent {{ c3_confluent_version }} from Artifactory"
  ansible.builtin.get_url:
    url: "{{ c3_artifactory_base_url }}/{{ c3_artifactory_repo }}/confluent/{{ c3_confluent_version }}/{{ c3_confluent_package }}"
    dest: "{{ c3_install_dir }}/confluent.tar"
    url_username: "{{ artifactory_user }}"
    url_password: "{{ artifactory_password }}"
    mode: "0644"
    timeout: 300

- name: "INSTALL | Extract Confluent"
  ansible.builtin.unarchive:
    src: "{{ c3_install_dir }}/confluent.tar"
    dest: "{{ c3_install_dir }}"
    remote_src: true
    extra_opts: ["--strip-components=1"]
    owner: "{{ c3_user }}"
    group: "{{ c3_group }}"

- name: "INSTALL | Remove archive"
  ansible.builtin.file:
    path: "{{ c3_install_dir }}/confluent.tar"
    state: absent

- name: "INSTALL | Download Confluent CLI from Artifactory"
  ansible.builtin.get_url:
    url: "{{ c3_artifactory_base_url }}/{{ c3_artifactory_repo }}/confluent/cli/confluent"
    dest: /usr/local/bin/confluent
    url_username: "{{ artifactory_user }}"
    url_password: "{{ artifactory_password }}"
    mode: "0755"

- name: "INSTALL | Download SSL certificates from Artifactory"
  ansible.builtin.get_url:
    url: "{{ c3_artifactory_base_url }}/{{ c3_artifactory_repo }}/certificates/{{ item.src }}"
    dest: "{{ item.dest }}"
    url_username: "{{ artifactory_user }}"
    url_password: "{{ artifactory_password }}"
    owner: "{{ c3_user }}"
    group: "{{ c3_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: "truststore.jks",     dest: "{{ c3_ssl_dir }}/truststore.jks",    mode: "0644" }
    - { src: "{{ c3_cert_name }}",  dest: "{{ c3_ssl_dir }}/{{ c3_cert_name }}", mode: "0640" }
    - { src: "mdspublic.pem",      dest: "{{ c3_ssl_dir }}/mdspublic.pem",     mode: "0644" }
    - { src: "mdskeypair.pem",     dest: "{{ c3_ssl_dir }}/mdskeypair.pem",    mode: "0440" }

- name: "INSTALL | Set ownership on install dir"
  ansible.builtin.file:
    path: "{{ c3_install_dir }}"
    state: directory
    recurse: true
    owner: "{{ c3_user }}"
    group: "{{ c3_group }}"
