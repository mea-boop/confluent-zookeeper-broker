---
# ==============================================================================
# ZooKeeper — Group Variables
# Merged from zookeeper.yml + jfrog_zookeeper.yml + uploaded task files
# ==============================================================================

# ------------------------------------------------------------------------------
# OS user/group
# ------------------------------------------------------------------------------
confluent_user: confluent
confluent_group: confluent
zookeeper_user: confluent
zookeeper_group: confluent

# ------------------------------------------------------------------------------
# Confluent installation (downloaded from JFrog Artifactory)
# ------------------------------------------------------------------------------
confluent_package_version: "7.7.3"
confluent_package: "confluent-7.7.3.tar.gz"
confluent_extract_dir: /app/zookeeper/confluent-extract
zookeeper_install_dir: /app/zookeeper/confluent
confluent_package_path: "/tmp/confluent-7.7.3.tar.gz"

# JFrog Artifactory
artifactory_base_url: "https://humana.jfrog.io/artifactory"
artifactory_repo: "enterpriseeventhub-generic-virtual"

# ------------------------------------------------------------------------------
# Directories
# ------------------------------------------------------------------------------
zookeeper_data_dir: /app/zookeeper/data
zookeeper_log_dir: /app/log/zookeeper
zk_log_dir: /app/log/zookeeper

zk_data_dirs:
  - /app/zookeeper/data
  - /app/zookeeper/confluent
  - /app/zookeeper/software
  - /app/zookeeper/software/ssl
  - /app/log/zookeeper
  - /opt/ssl
  - /etc/node_exporter
  - /deployment/scripts
  - /opt/logarchive
  - /opt/prometheus

# SSL certificate files to download from Artifactory
ssl_cert_files:
  - truststore.jks
  - _.npe.eeh.humana.com.pfx
  - mdspublic.pem
  - mdskeypair.pem
  - chainrootcertificate.cer

# ------------------------------------------------------------------------------
# Disk layout
# ------------------------------------------------------------------------------
filesystem_type: xfs
mount_options: defaults

zookeeper_disks:
  - device: /dev/sdc
    mount_point: /app/zookeeper
  - device: /dev/sdd
    mount_point: /app/log

zookeeper_disks_umount:
  - device: /dev/sdc
    mount_point: /media/data1
  - device: /dev/sdd
    mount_point: /media/data2

# ------------------------------------------------------------------------------
# ZooKeeper config
# ------------------------------------------------------------------------------
zookeeper_client_port: 2181
zookeeper_peer_port: 2888
zookeeper_leader_port: 3888
zookeeper_admin_server_port: 8080
zookeeper_tick_time: 2000
zookeeper_init_limit: 10
zookeeper_sync_limit: 5
zookeeper_max_client_connections: 60
zookeeper_autopurge_snap_retain_count: 3
zookeeper_autopurge_purge_interval: 1
zookeeper_4lw_commands_whitelist: "stat, ruok, conf, isro, mntr, srvr"
zookeeper_service_name: confluent-zookeeper
zookeeper_jmx_port: 9001

# ------------------------------------------------------------------------------
# JVM
# ------------------------------------------------------------------------------
zookeeper_heap_opts: "-Xmx4g -Xms4g"
zookeeper_jvm_performance_opts: >-
  -XX:+UseG1GC
  -XX:MaxGCPauseMillis=20
  -XX:InitiatingHeapOccupancyPercent=35
  -XX:+ExplicitGCInvokesConcurrent
  -Djava.awt.headless=true

# ------------------------------------------------------------------------------
# Prometheus JMX Exporter
# ------------------------------------------------------------------------------
prometheus_jmx_exporter_enabled: true
prometheus_jmx_exporter_port: 7070
prometheus_jmx_exporter_jar: /opt/prometheus/jmx_prometheus_javaagent.jar
prometheus_jmx_config: /opt/prometheus/prometheus-config/jmx-zookeeper-prometheus.yml
java_agent_string: "-javaagent:{{ prometheus_jmx_exporter_jar }}={{ prometheus_jmx_exporter_port }}:{{ prometheus_jmx_config }}"

# ------------------------------------------------------------------------------
# Azure Storage
# ------------------------------------------------------------------------------
storage_account_url: "https://eehcentralus2npe.blob.core.windows.net"
container: "confluent-kafka"

# ------------------------------------------------------------------------------
# Restart playbook settings
# ------------------------------------------------------------------------------
restart_wait_time: 20
restart_max_retries: 10
restart_retry_delay: 10

# ------------------------------------------------------------------------------
# Feature flags
# ------------------------------------------------------------------------------
install_java: false
create_zookeeper_user: true
configure_firewall: false
start_zookeeper: true
enable_zookeeper: true
validate_deployment: true
