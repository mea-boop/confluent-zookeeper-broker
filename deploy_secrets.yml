---
# ==============================================================================
# Deploy and encrypt Confluent SecurePass local-secrets.properties
#
# Flow:
#   1. Load vault secrets
#   2. Ensure /opt/secrets directory exists
#   3. Write plaintext local-secrets.properties (mode 0600)
#   4. Encrypt ALL values in local-secrets.properties in one shot
#   5. Assert all values are encrypted (ENC[ markers present)
#   6. Verify server.properties ${securepass:...} references are intact
#
# NOTE: server.properties already contains ${securepass:...} references baked
#       in by the template — we do NOT pass --config-file to the encrypt
#       command. We encrypt the local-secrets file directly in-place.
# ==============================================================================

# ------------------------------------------------------------------------------
# Step 1: Load vault secrets
# ------------------------------------------------------------------------------
- name: "SECRETS | Load secret variables"
  ansible.builtin.include_vars:
    file: "../roles/vars/secret.yml"
  no_log: true

# ------------------------------------------------------------------------------
# Step 2: Ensure /opt/secrets directory exists with strict permissions
# ------------------------------------------------------------------------------
- name: "SECRETS | Ensure {{ broker_secrets_dir }} exists"
  ansible.builtin.file:
    path: "{{ broker_secrets_dir }}"
    state: directory
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0700"

# ------------------------------------------------------------------------------
# Step 3: Write plaintext local-secrets.properties from template.
# ------------------------------------------------------------------------------
- name: "SECRETS | Write plaintext local-secrets.properties"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/local-secrets.properties.sh.j2"
    dest: "{{ broker_secrets_dir }}/local-secrets.properties"
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"
    backup: false
  no_log: true

# ------------------------------------------------------------------------------
# Step 4: Encrypt ALL values in local-secrets.properties in one shot.
#
# Since server.properties already has ${securepass:...} refs baked in by the
# Ansible template, we do NOT pass --config-file or --config. We encrypt the
# local-secrets file directly — this replaces every plaintext value with
# ENC[...] ciphertext in-place.
# ------------------------------------------------------------------------------
- name: "SECRETS | Encrypt local-secrets.properties in-place"
  ansible.builtin.command:
    argv:
      - "{{ broker_install_dir }}/bin/confluent"
      - "secret"
      - "file"
      - "encrypt"
      - "--local-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--remote-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
  environment:
    CONFLUENT_SECURITY_MASTER_KEY: "{{ CONFLUENT_SECURITY_MASTER_KEY }}"
  become: true
  become_user: "{{ broker_user }}"
  register: encrypt_result
  failed_when: encrypt_result.rc != 0
  changed_when: true

- name: "SECRETS | Show encrypt output"
  ansible.builtin.debug:
    msg: "{{ encrypt_result.stdout_lines }}"

# ------------------------------------------------------------------------------
# Step 5: Assert all 21 values are encrypted — every value line must have ENC[
# ------------------------------------------------------------------------------
- name: "SECRETS | Count encrypted values in local-secrets.properties"
  ansible.builtin.command:
    argv:
      - grep
      - "--count"
      - "ENC["
      - "{{ broker_secrets_dir }}/local-secrets.properties"
  register: enc_count
  changed_when: false
  failed_when: enc_count.rc != 0

- name: "SECRETS | Assert all 21 values are encrypted"
  ansible.builtin.assert:
    that:
      - enc_count.stdout | int == 21
    fail_msg: >-
      FAILED: Only {{ enc_count.stdout }} of 21 properties are encrypted in
      {{ broker_secrets_dir }}/local-secrets.properties — plaintext values remain.
    success_msg: "OK: All 21 properties encrypted in local-secrets.properties"

# ------------------------------------------------------------------------------
# Step 6: Verify server.properties has ${securepass:...} references
# ------------------------------------------------------------------------------
- name: "SECRETS | Verify server.properties references secrets file"
  ansible.builtin.command:
    argv:
      - grep
      - "--count"
      - "securepass"
      - "{{ broker_config_dir }}/server.properties"
  register: securepass_count
  changed_when: false
  failed_when: securepass_count.rc != 0

- name: "SECRETS | Display securepass reference count"
  ansible.builtin.debug:
    msg: "server.properties contains {{ securepass_count.stdout }} securepass references — encryption complete"
