---
# ==============================================================================
# Deploy and encrypt Control Center secrets via Confluent SecurePass
#
# Same pattern as broker deploy_secrets.yml:
#   - Write plaintext seed file to temp dir named "control-center.properties"
#     so CLI writes keys as control-center.properties/<key> in local-secrets
#   - awk extracts keys dynamically — add new secrets only in seed template
#   - block/always guarantees temp dir cleanup even on failure
# ==============================================================================

- name: "SECRETS | Load secret variables"
  ansible.builtin.include_vars:
    file: "../roles/vars/c3-secret.yml"
  no_log: true

- name: "SECRETS | Ensure {{ c3_secrets_dir }} exists"
  ansible.builtin.file:
    path: "{{ c3_secrets_dir }}"
    state: directory
    owner: "{{ c3_user }}"
    group: "{{ c3_group }}"
    mode: "0700"

- name: "SECRETS | Create temp directory for seed file"
  ansible.builtin.tempfile:
    state: directory
    prefix: "c3_secrets_"
  register: c3_secrets_tmpdir
  become: true
  become_user: "{{ c3_user }}"

- name: "SECRETS | Encrypt secrets block"
  block:

    - name: "SECRETS | Write plaintext seed file"
      ansible.builtin.template:
        src: "{{ role_path }}/templates/c3-secrets-seed.properties.j2"
        dest: "{{ c3_secrets_tmpdir.path }}/control-center.properties"
        owner: "{{ c3_user }}"
        group: "{{ c3_group }}"
        mode: "0600"
      no_log: true

    - name: "SECRETS | Extract property keys from seed file"
      ansible.builtin.command:
        argv:
          - awk
          - "!/^[[:space:]]*(#|$)/ && /=/ { n=index($0,"="); k=substr($0,1,n-1); gsub(/[[:space:]]/,"",k); print k }"
          - "{{ c3_secrets_tmpdir.path }}/control-center.properties"
      register: c3_seed_keys_raw
      changed_when: false
      become: true
      become_user: "{{ c3_user }}"

    - name: "SECRETS | Build secret_properties list"
      ansible.builtin.set_fact:
        c3_secret_properties: "{{ c3_seed_keys_raw.stdout_lines }}"

    - name: "SECRETS | Show properties to encrypt ({{ c3_secret_properties | length }} total)"
      ansible.builtin.debug:
        msg: "Will encrypt {{ c3_secret_properties | length }} properties"

    - name: "SECRETS | Initialise empty local-secrets.properties"
      ansible.builtin.file:
        path: "{{ c3_secrets_dir }}/local-secrets.properties"
        state: touch
        owner: "{{ c3_user }}"
        group: "{{ c3_group }}"
        mode: "0600"

    - name: "SECRETS | Encrypt each property"
      ansible.builtin.include_tasks: c3_encrypt_one_property.yml
      loop: "{{ c3_secret_properties }}"
      loop_control:
        loop_var: c3_secret_item

  always:
    - name: "SECRETS | Always remove temp seed directory"
      ansible.builtin.file:
        path: "{{ c3_secrets_tmpdir.path }}"
        state: absent
      become: true
      become_user: "{{ c3_user }}"

- name: "SECRETS | Count ENC[ markers in local-secrets.properties"
  ansible.builtin.command:
    argv:
      - grep
      - "--fixed-strings"
      - "--count"
      - "ENC["
      - "{{ c3_secrets_dir }}/local-secrets.properties"
  register: c3_enc_count
  changed_when: false
  failed_when: c3_enc_count.rc != 0

- name: "SECRETS | Assert all properties are encrypted"
  ansible.builtin.assert:
    that:
      - c3_enc_count.stdout | int >= c3_secret_properties | length
    fail_msg: >-
      FAILED: Only {{ c3_enc_count.stdout }} of {{ c3_secret_properties | length }}
      properties encrypted in {{ c3_secrets_dir }}/local-secrets.properties
    success_msg: >-
      OK: {{ c3_enc_count.stdout }} ENC[ entries —
      {{ c3_secret_properties | length }} secrets encrypted successfully
