---
# ==============================================================================
# Deploy and encrypt Confluent SecurePass local-secrets.properties
#
# Flow:
#   1. Load vault secrets
#   2. Ensure /opt/secrets directory exists
#   3. Write plaintext local-secrets.properties (mode 0600)
#   4. Run `confluent secret file encrypt` for every secret property
#   5. Verify file exists and has correct permissions
#   6. Verify server.properties ${securepass:...} references are intact
# ==============================================================================

# ------------------------------------------------------------------------------
# Step 1: Load vault secrets
# ------------------------------------------------------------------------------
- name: "SECRETS | Load secret variables"
  ansible.builtin.include_vars:
    file: "../roles/vars/secret.yml"
  no_log: true

# ------------------------------------------------------------------------------
# Step 2: Ensure /opt/secrets directory exists with strict permissions
# ------------------------------------------------------------------------------
- name: "SECRETS | Ensure {{ broker_secrets_dir }} exists"
  ansible.builtin.file:
    path: "{{ broker_secrets_dir }}"
    state: directory
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0700"

# ------------------------------------------------------------------------------
# Step 3: Write plaintext local-secrets.properties from template.
#         confluent secret encrypt will encrypt each value in-place.
# ------------------------------------------------------------------------------
- name: "SECRETS | Write plaintext local-secrets.properties"
  ansible.builtin.template:
    src: local-secrets.properties.sh.j2
    dest: "{{ broker_secrets_dir }}/local-secrets.properties"
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"
    backup: false
  no_log: true

# ------------------------------------------------------------------------------
# Step 4: Encrypt each secret property in-place.
#
# confluent secret file encrypt is idempotent — re-running on an already
# encrypted value re-encrypts safely. CONFLUENT_SECURITY_MASTER_KEY is
# passed as an environment variable, never written to disk.
# ------------------------------------------------------------------------------
- name: "SECRETS | Encrypt all secret properties"
  ansible.builtin.command: >
    {{ broker_install_dir }}/bin/confluent secret file encrypt
    --config-file {{ broker_config_dir }}/server.properties
    --local-secrets-file {{ broker_secrets_dir }}/local-secrets.properties
    --remote-secrets-file {{ broker_secrets_dir }}/local-secrets.properties
    --config "{{ item }}"
  environment:
    CONFLUENT_SECURITY_MASTER_KEY: "{{ CONFLUENT_SECURITY_MASTER_KEY }}"
  become: true
  become_user: "{{ broker_user }}"
  no_log: true
  changed_when: true
  loop:
    - "ssl.truststore.password"
    - "ssl.keystore.password"
    - "ssl.key.password"
    - "listener.name.sasl_ssl.scram-sha-256.sasl.jaas.config"
    - "listener.name.token.ssl.truststore.password"
    - "listener.name.token.ssl.keystore.password"
    - "listener.name.token.ssl.key.password"
    - "listener.name.token.oauthbearer.sasl.jaas.config"
    - "listener.name.ad.ssl.truststore.password"
    - "listener.name.ad.ssl.keystore.password"
    - "listener.name.ad.ssl.key.password"
    - "confluent.metadata.server.ssl.truststore.password"
    - "confluent.metadata.server.ssl.keystore.password"
    - "confluent.metadata.server.ssl.key.password"
    - "confluent.metrics.reporter.ssl.truststore.password"
    - "confluent.metrics.reporter.sasl.jaas.config"
    - "confluent.security.event.logger.exporter.kafka.ssl.truststore.password"
    - "confluent.security.event.logger.exporter.kafka.sasl.jaas.config"
    - "ldap.java.naming.security.credentials"
    - "ldap.ssl.truststore.password"
    - "confluent.oidc.idp.client.secret"

# ------------------------------------------------------------------------------
# Step 5: Verify file permissions
# ------------------------------------------------------------------------------
- name: "SECRETS | Stat local-secrets.properties"
  ansible.builtin.stat:
    path: "{{ broker_secrets_dir }}/local-secrets.properties"
  register: secrets_stat

- name: "SECRETS | Assert local-secrets.properties exists with mode 0600"
  ansible.builtin.assert:
    that:
      - secrets_stat.stat.exists
      - secrets_stat.stat.mode == "0600"
      - secrets_stat.stat.pw_name == broker_user
    fail_msg: >-
      FAILED: {{ broker_secrets_dir }}/local-secrets.properties
      was not created or has wrong permissions.
      exists={{ secrets_stat.stat.exists }}
      mode={{ secrets_stat.stat.mode | default('unknown') }}
      owner={{ secrets_stat.stat.pw_name | default('unknown') }}
    success_msg: >-
      OK: {{ broker_secrets_dir }}/local-secrets.properties
      created (mode=0600, owner={{ secrets_stat.stat.pw_name }})

# ------------------------------------------------------------------------------
# Step 6: Verify server.properties has ${securepass:...} references
# ------------------------------------------------------------------------------
- name: "SECRETS | Verify server.properties references secrets file"
  ansible.builtin.command: >
    grep -c "securepass" {{ broker_config_dir }}/server.properties
  register: securepass_count
  changed_when: false
  failed_when: securepass_count.rc != 0

- name: "SECRETS | Display securepass reference count"
  ansible.builtin.debug:
    msg: "server.properties contains {{ securepass_count.stdout }} securepass references — encryption complete"
