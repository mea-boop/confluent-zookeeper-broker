---
# ==============================================================================
# Deploy and encrypt Confluent SecurePass secrets
#
# Workflow (confirmed by manual test on broker):
#   1. Write a temp seed file named "server.properties" containing plaintext
#      secret values from vault. The CLI uses the filename as the key prefix
#      in local-secrets.properties — so naming it "server.properties" ensures
#      the keys match what the broker reads via ${securepass:...} refs.
#   2. Touch empty local-secrets.properties
#   3. Run confluent secret file encrypt per key — CLI reads plaintext from
#      seed file, writes ENC[...] into local-secrets.properties, and replaces
#      the plaintext in the seed file with a securepass ref (we discard it).
#   4. Delete the seed file — it is ephemeral, never persisted.
#   5. Assert all 21 values are encrypted.
#   6. Verify server.properties (the real one) has securepass refs.
#
# The real server.properties is never written with plaintext — it has
# ${securepass:...} refs baked in by configure.yml from the template.
# ==============================================================================

# ------------------------------------------------------------------------------
# Step 1: Load vault secrets
# ------------------------------------------------------------------------------
- name: "SECRETS | Load secret variables"
  ansible.builtin.include_vars:
    file: "../roles/vars/secret.yml"
  no_log: true

# ------------------------------------------------------------------------------
# Step 2: Ensure /opt/secrets directory exists with strict permissions
# ------------------------------------------------------------------------------
- name: "SECRETS | Ensure {{ broker_secrets_dir }} exists"
  ansible.builtin.file:
    path: "{{ broker_secrets_dir }}"
    state: directory
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0700"

# ------------------------------------------------------------------------------
# Step 3: Create temp directory for seed file
# ------------------------------------------------------------------------------
- name: "SECRETS | Create temp directory for seed file"
  ansible.builtin.tempfile:
    state: directory
    prefix: "confluent_secrets_"
  register: secrets_tmpdir
  become: true
  become_user: "{{ broker_user }}"

# ------------------------------------------------------------------------------
# Step 4: Write plaintext seed file named "server.properties" into temp dir.
#         The CLI uses the --config-file basename as the key prefix written
#         into local-secrets.properties — must be "server.properties" to
#         match the ${securepass:.../server.properties/<key>} refs the broker
#         reads from the real server.properties.
# ------------------------------------------------------------------------------
- name: "SECRETS | Write plaintext seed file"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/secrets-seed.properties.j2"
    dest: "{{ secrets_tmpdir.path }}/server.properties"
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"
  no_log: true

# ------------------------------------------------------------------------------
# Step 5: Touch empty local-secrets.properties — CLI requires file to exist
# ------------------------------------------------------------------------------
- name: "SECRETS | Initialise empty local-secrets.properties"
  ansible.builtin.file:
    path: "{{ broker_secrets_dir }}/local-secrets.properties"
    state: touch
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"

# ------------------------------------------------------------------------------
# Step 6: Encrypt each property.
#         --config-file points to the seed file (named server.properties).
#         CLI writes ENC[...] into local-secrets.properties keyed as
#         "server.properties/<property>" — matching the broker's securepass refs.
# ------------------------------------------------------------------------------
- name: "SECRETS | Encrypt property: {{ item }}"
  ansible.builtin.command:
    argv:
      - "{{ broker_install_dir }}/bin/confluent"
      - "secret"
      - "file"
      - "encrypt"
      - "--config-file"
      - "{{ secrets_tmpdir.path }}/server.properties"
      - "--local-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--remote-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--config"
      - "{{ item }}"
  environment:
    CONFLUENT_SECURITY_MASTER_KEY: "{{ CONFLUENT_SECURITY_MASTER_KEY }}"
  become: true
  become_user: "{{ broker_user }}"
  register: encrypt_result
  failed_when: encrypt_result.rc != 0
  changed_when: true
  loop:
    - "ssl.truststore.password"
    - "ssl.keystore.password"
    - "ssl.key.password"
    - "listener.name.sasl_ssl.scram-sha-256.sasl.jaas.config"
    - "listener.name.token.ssl.truststore.password"
    - "listener.name.token.ssl.keystore.password"
    - "listener.name.token.ssl.key.password"
    - "listener.name.token.oauthbearer.sasl.jaas.config"
    - "listener.name.ad.ssl.truststore.password"
    - "listener.name.ad.ssl.keystore.password"
    - "listener.name.ad.ssl.key.password"
    - "confluent.metadata.server.ssl.truststore.password"
    - "confluent.metadata.server.ssl.keystore.password"
    - "confluent.metadata.server.ssl.key.password"
    - "confluent.metrics.reporter.ssl.truststore.password"
    - "confluent.metrics.reporter.sasl.jaas.config"
    - "confluent.security.event.logger.exporter.kafka.ssl.truststore.password"
    - "confluent.security.event.logger.exporter.kafka.sasl.jaas.config"
    - "ldap.java.naming.security.credentials"
    - "ldap.ssl.truststore.password"
    - "confluent.oidc.idp.client.secret"

# ------------------------------------------------------------------------------
# Step 7: Delete temp seed file and directory — ephemeral, never persisted
# ------------------------------------------------------------------------------
- name: "SECRETS | Remove temp seed directory"
  ansible.builtin.file:
    path: "{{ secrets_tmpdir.path }}"
    state: absent

# ------------------------------------------------------------------------------
# Step 8: Assert all 21 values are encrypted in local-secrets.properties
# ------------------------------------------------------------------------------
- name: "SECRETS | Count ENC[ markers in local-secrets.properties"
  ansible.builtin.command:
    argv:
      - grep
      - "--fixed-strings"
      - "--count"
      - "ENC["
      - "{{ broker_secrets_dir }}/local-secrets.properties"
  register: enc_count
  changed_when: false
  failed_when: enc_count.rc != 0

- name: "SECRETS | Assert all 21 values are encrypted"
  ansible.builtin.assert:
    that:
      - enc_count.stdout | int == 21
    fail_msg: >-
      FAILED: Only {{ enc_count.stdout }} of 21 properties are encrypted in
      {{ broker_secrets_dir }}/local-secrets.properties — plaintext values remain.
    success_msg: "OK: All 21 properties encrypted in local-secrets.properties"

# ------------------------------------------------------------------------------
# Step 9: Verify real server.properties has ${securepass:...} references
# ------------------------------------------------------------------------------
- name: "SECRETS | Count securepass refs in server.properties"
  ansible.builtin.command:
    argv:
      - grep
      - "--count"
      - "securepass"
      - "{{ broker_config_dir }}/server.properties"
  register: securepass_count
  changed_when: false
  failed_when: securepass_count.rc != 0

- name: "SECRETS | Display securepass reference count"
  ansible.builtin.debug:
    msg: "server.properties contains {{ securepass_count.stdout }} securepass references — encryption complete"
