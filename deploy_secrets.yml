---
# ==============================================================================
# Deploy and encrypt Confluent SecurePass secrets
#
# To add a new secret:
#   1. Add the value to roles/vars/secret.yml (vault encrypted)
#   2. Add the key = {{ variable }} line to secrets-seed.properties.j2
#   That is all — the loop and assertion below are fully dynamic.
#
# Workflow:
#   1. Load vault secrets
#   2. Ensure /opt/secrets directory exists
#   3. Create temp dir, write seed file named "server.properties"
#   4. Parse seed file to build the encrypt key list dynamically
#   5. Touch empty local-secrets.properties
#   6. Encrypt every key found in the seed file
#   7. Delete temp seed dir
#   8. Assert ENC[ count >= number of keys encrypted
#   9. Verify real server.properties has securepass refs
# ==============================================================================

# ------------------------------------------------------------------------------
# Step 1: Load vault secrets
# ------------------------------------------------------------------------------
- name: "SECRETS | Load secret variables"
  ansible.builtin.include_vars:
    file: "../roles/vars/secret.yml"
  no_log: true

# ------------------------------------------------------------------------------
# Step 2: Ensure /opt/secrets directory exists
# ------------------------------------------------------------------------------
- name: "SECRETS | Ensure {{ broker_secrets_dir }} exists"
  ansible.builtin.file:
    path: "{{ broker_secrets_dir }}"
    state: directory
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0700"

# ------------------------------------------------------------------------------
# Step 3: Create temp dir and write seed file named "server.properties".
#         The CLI uses the --config-file basename as the key prefix in
#         local-secrets.properties — must match the broker's securepass refs.
# ------------------------------------------------------------------------------
- name: "SECRETS | Create temp directory for seed file"
  ansible.builtin.tempfile:
    state: directory
    prefix: "confluent_secrets_"
  register: secrets_tmpdir
  become: true
  become_user: "{{ broker_user }}"

- name: "SECRETS | Write plaintext seed file"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/secrets-seed.properties.j2"
    dest: "{{ secrets_tmpdir.path }}/server.properties"
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"
  no_log: true

# ------------------------------------------------------------------------------
# Step 4: Parse the rendered seed file to extract property keys dynamically.
#         Skips blank lines and comment lines (starting with #).
#         Result: secret_properties = ["ssl.truststore.password", ...]
# ------------------------------------------------------------------------------
- name: "SECRETS | Read rendered seed file"
  ansible.builtin.slurp:
    src: "{{ secrets_tmpdir.path }}/server.properties"
  register: seed_file_raw
  no_log: true

- name: "SECRETS | Parse secret property keys from seed file"
  ansible.builtin.set_fact:
    secret_properties: >-
      {{
        (seed_file_raw.content | b64decode).splitlines()
        | reject('match', '^\\s*#')
        | reject('match', '^\\s*$')
        | map('regex_replace', '^\\s*([^=\\s]+)\\s*=.*$', '\\1')
        | list
      }}

- name: "SECRETS | Show properties to encrypt ({{ secret_properties | length }} total)"
  ansible.builtin.debug:
    msg: "Will encrypt {{ secret_properties | length }} properties: {{ secret_properties }}"

# ------------------------------------------------------------------------------
# Step 5: Touch empty local-secrets.properties — CLI requires file to exist
# ------------------------------------------------------------------------------
- name: "SECRETS | Initialise empty local-secrets.properties"
  ansible.builtin.file:
    path: "{{ broker_secrets_dir }}/local-secrets.properties"
    state: touch
    owner: "{{ broker_user }}"
    group: "{{ broker_group }}"
    mode: "0600"

# ------------------------------------------------------------------------------
# Step 6: Encrypt every property found in the seed file.
#         Adding a new secret to secrets-seed.properties.j2 is all that is
#         needed — this loop picks it up automatically.
# ------------------------------------------------------------------------------
- name: "SECRETS | Encrypt property: {{ item }}"
  ansible.builtin.command:
    argv:
      - "{{ broker_install_dir }}/bin/confluent"
      - "secret"
      - "file"
      - "encrypt"
      - "--config-file"
      - "{{ secrets_tmpdir.path }}/server.properties"
      - "--local-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--remote-secrets-file"
      - "{{ broker_secrets_dir }}/local-secrets.properties"
      - "--config"
      - "{{ item }}"
  environment:
    CONFLUENT_SECURITY_MASTER_KEY: "{{ CONFLUENT_SECURITY_MASTER_KEY }}"
  become: true
  become_user: "{{ broker_user }}"
  register: encrypt_result
  failed_when: encrypt_result.rc != 0
  changed_when: true
  loop: "{{ secret_properties }}"

# ------------------------------------------------------------------------------
# Step 7: Delete temp seed dir — plaintext never persists after this point
# ------------------------------------------------------------------------------
- name: "SECRETS | Remove temp seed directory"
  ansible.builtin.file:
    path: "{{ secrets_tmpdir.path }}"
    state: absent

# ------------------------------------------------------------------------------
# Step 8: Assert all properties are encrypted.
#         Count derived from parsed key list — no hardcoding.
#         CLI also writes a _metadata ENC[ line so count >= key list length.
# ------------------------------------------------------------------------------
- name: "SECRETS | Count ENC[ markers in local-secrets.properties"
  ansible.builtin.command:
    argv:
      - grep
      - "--fixed-strings"
      - "--count"
      - "ENC["
      - "{{ broker_secrets_dir }}/local-secrets.properties"
  register: enc_count
  changed_when: false
  failed_when: enc_count.rc != 0

- name: "SECRETS | Assert all properties are encrypted"
  ansible.builtin.assert:
    that:
      - enc_count.stdout | int >= secret_properties | length
    fail_msg: >-
      FAILED: Only {{ enc_count.stdout }} of {{ secret_properties | length }}
      properties are encrypted in {{ broker_secrets_dir }}/local-secrets.properties
      — plaintext values remain.
    success_msg: >-
      OK: {{ enc_count.stdout }} ENC[ entries found —
      {{ secret_properties | length }} secrets encrypted successfully

# ------------------------------------------------------------------------------
# Step 9: Verify real server.properties has ${securepass:...} references
# ------------------------------------------------------------------------------
- name: "SECRETS | Count securepass refs in server.properties"
  ansible.builtin.command:
    argv:
      - grep
      - "--count"
      - "securepass"
      - "{{ broker_config_dir }}/server.properties"
  register: securepass_count
  changed_when: false
  failed_when: securepass_count.rc != 0

- name: "SECRETS | Display securepass reference count"
  ansible.builtin.debug:
    msg: "server.properties contains {{ securepass_count.stdout }} securepass references — encryption complete"
