---
# ==============================================================================
# Deploy systemd service unit
# ==============================================================================

- name: "SERVICE | Deploy systemd service file"
  ansible.builtin.template:
    src: "{{ role_path }}/templates/zookeeper.service.j2"
    dest: "/etc/systemd/system/{{ zookeeper_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
    force: true
  notify: reload systemd

- name: "SERVICE | Reload systemd daemon"
  ansible.builtin.systemd:
    daemon_reload: true
