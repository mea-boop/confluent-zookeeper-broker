---
- name: Create systemd service file for confluent-kafka
  ansible.builtin.template:
    src: "{{ role_path }}/templates/confluent-kafka.service.j2"
    dest: "/etc/systemd/system/{{ broker_service_name }}.service"
    owner: root
    group: root
    mode: "0640"
  no_log: true
  notify: reload systemd
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
