---
# Defaults — override in c3-vars.yml or inventory
c3_user: confluent
c3_group: confluent
c3_rest_port: 9022
c3_jmx_port: 9000
c3_node_exporter_port: 8087
c3_heap_opts: "-Xmx20g"

---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: disable thp now
  ansible.builtin.shell:
    cmd: echo never > /sys/kernel/mm/transparent_hugepage/enabled
  changed_when: true
