---
# ==============================================================================
# Confluent Control Center — Variables
# All secrets are in c3-secret.yml (Ansible Vault encrypted)
# ==============================================================================

# ------------------------------------------------------------------------------
# Control Center host identity
# ------------------------------------------------------------------------------
c3_user: confluent
c3_group: confluent

# ------------------------------------------------------------------------------
# Confluent installation
# ------------------------------------------------------------------------------
c3_install_dir: /opt/confluent
c3_config_dir: /opt/confluent/etc/confluent-control-center
c3_config_file: control-center.properties
c3_service_name: confluent-control-center
c3_binary: /opt/confluent/bin/control-center-start
c3_confluent_version: "7.7.3"
c3_confluent_package: "confluent-7.7.3.tar"
c3_artifactory_base_url: "https://artifactory.humana.com/artifactory"
c3_artifactory_repo: "confluent-local"

# ------------------------------------------------------------------------------
# Directories
# ------------------------------------------------------------------------------
c3_data_dir: /app/control-center/data
c3_data_tmp_dir: /app/control-center/data/tmp
c3_log_dir: /app/control-center/log
c3_ssl_dir: /opt/ssl
c3_secrets_dir: /opt/secrets
c3_scripts_dir: /deployment/scripts

# ------------------------------------------------------------------------------
# SSL / TLS
# ------------------------------------------------------------------------------
c3_ssl_truststore_location: /opt/ssl/truststore.jks
c3_ssl_keystore_location: "/opt/ssl/{{ c3_cert_name }}"
c3_ssl_mds_public_key: /opt/ssl/mdspublic.pem
c3_ssl_jaas_file: /opt/ssl/propertyfile.jaas
c3_ssl_login_properties: /opt/ssl/login.properties
c3_cert_name: "{{ inventory_hostname }}.jks"

# ------------------------------------------------------------------------------
# Network / ports
# ------------------------------------------------------------------------------
c3_rest_port: 9022
c3_jmx_port: 9000
c3_node_exporter_port: 8087

# ------------------------------------------------------------------------------
# Broker / MDS connectivity
# ------------------------------------------------------------------------------
c3_broker_lb_fqdn: "dev-broker-lb-centralus.npe.eeh.humana.com"
c3_mds_url: "https://{{ c3_broker_lb_fqdn }}:8090"
c3_bootstrap_servers: "{{ c3_broker_lb_fqdn }}:9092"
c3_kafka_cluster_id: ""   # populated at runtime via MDS API

# ------------------------------------------------------------------------------
# Connect / Schema Registry
# ------------------------------------------------------------------------------
c3_connect_cluster_name: connect-cluster-shared
c3_connect_url: "https://dev-connect-shared-centralus.npe.eeh.humana.com:8083"
c3_schema_registry_url: "https://dev-schema-registry-shared-centralus.npe.eeh.humana.com:8081"

# ------------------------------------------------------------------------------
# Control Center config
# ------------------------------------------------------------------------------
c3_id: 5
c3_stream_threads: 8
c3_internal_topics_partitions: 4
c3_command_topic: _confluent-command
c3_command_topic_replication: 3
c3_metrics_topic_skip_backlog_minutes: 10080
c3_monitoring_topic_skip_backlog_minutes: 10080

# ------------------------------------------------------------------------------
# Email alerts
# ------------------------------------------------------------------------------
c3_mail_enabled: true
c3_mail_host: pobox.humana.com
c3_mail_port: 2525
c3_mail_from: kafka-monitor@cdf.humana.com

# ------------------------------------------------------------------------------
# JVM heap
# ------------------------------------------------------------------------------
c3_heap_opts: "-Xmx20g"

# ------------------------------------------------------------------------------
# OS tuning (same as broker)
# ------------------------------------------------------------------------------
c3_sysctl_params:
  vm.swappiness: 1
  vm.dirty_ratio: 60
  vm.dirty_background_ratio: 5
  net.core.rmem_max: 2097152
  net.core.wmem_max: 2097152

c3_limits:
  - { domain: "*", type: soft, item: nofile, value: 500000 }
  - { domain: "*", type: hard, item: nofile, value: 500000 }
  - { domain: "*", type: soft, item: nproc,  value: 500000 }
  - { domain: "*", type: hard, item: nproc,  value: 500000 }

# ------------------------------------------------------------------------------
# Disk layout (LVM volumes to extend at provisioning time)
# ------------------------------------------------------------------------------
c3_lvm_volumes:
  - { lv: /dev/mapper/rootvg-rootlv, size: "+15G", fs: /dev/mapper/rootvg-rootlv }
  - { lv: /dev/mapper/rootvg-optlv,  size: "+15G", fs: /dev/mapper/rootvg-optlv }

# ------------------------------------------------------------------------------
# Dynatrace
# ------------------------------------------------------------------------------
c3_dynatrace_installer: "Dynatrace-OneAgent-Linux-1.305.98.sh"
c3_dynatrace_host_group: "eeh-dev-control-center"
c3_dynatrace_network_zone: "azure.centralus"

# ------------------------------------------------------------------------------
# Node exporter
# ------------------------------------------------------------------------------
c3_node_exporter_package: "node_exporter-0.18.1.linux-amd64.tar.gz"
c3_node_exporter_dir: /etc/node_exporter

