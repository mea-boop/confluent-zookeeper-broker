---
# ==============================================================================
# Validate Control Center is healthy
# ==============================================================================

- name: "VALIDATE | Get service status"
  ansible.builtin.systemd:
    name: "{{ c3_service_name }}"
  register: c3_service_status

- name: "VALIDATE | Assert service is active and running"
  ansible.builtin.assert:
    that:
      - c3_service_status.status.ActiveState == "active"
      - c3_service_status.status.SubState == "running"
    fail_msg: >-
      Control Center service is {{ c3_service_status.status.ActiveState }}/
      {{ c3_service_status.status.SubState }} — expected active/running
    success_msg: "Control Center is active and running"

- name: "VALIDATE | Check REST port {{ c3_rest_port }} is open"
  ansible.builtin.wait_for:
    host: "{{ ansible_fqdn }}"
    port: "{{ c3_rest_port }}"
    state: started
    timeout: 30

- name: "VALIDATE | Display Control Center status"
  ansible.builtin.debug:
    msg: "Control Center {{ ansible_fqdn }}:{{ c3_rest_port }} — {{ c3_service_status.status.ActiveState }}/{{ c3_service_status.status.SubState }}"
